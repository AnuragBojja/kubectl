apiVersion: v1
kind: Service
metadata:
  name: nordport-roboshop
  labels:
    name: roboshop-dev-nordport
    env: dev
spec:
  type: NodePort
  selector:
    name: roboshop-dev-nordport
    env: dev
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30007

---
apiVersion: v1
kind: Pod 
metadata:
  name: np-nginx
  labels:
    name: roboshop-dev-nordport
    env: dev
spec:
  containers:
  - name: nginx-np
    image: nginx
    ports:
    - containerPort: 80