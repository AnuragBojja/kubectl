apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    name: roboshop
    project: roboshop-dev
    env: dev
    purpose: service 
spec:
  selector:
    name: pod-services
    env: dev
    project: roboshop-dev
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: service-pod-1
  labels:
    name: pod-services
    env: dev
    project: roboshop-dev
spec:
  containers:
  - name: nginx-1
    image: nginx
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: service-pod-2
  labels:
    name: pod-services
    env: dev
    project: roboshop-dev
spec:
  containers:
  - name: nginx-2
    image: nginx
    ports:
    - containerPort: 80