apiVersion: apps/v1
kind: DaemonSet 
metadata:
  name: hostport-demo
  namespace: kube-system   # admnistrator Work
  labels:
    purpose: testing

spec:
  selector:
    matchLabels:
      purpose: hostport-demo
  template:
    metadata:
      labels:
        purpose: hostport-demo
    spec:
      containers:
        - name: fluentd-elasticsearch
          image: quay.io/fluentd_elasticsearch/fluentd:v5.0.1
          volumeMounts:
          - name: hostpath-vol
            mountPath: /mnt/log
            readOnly: true

      volumes:
      - name: hostpath-vol
        hostPath:
          path: /var/log


