apiVersion: v1
kind: Pod
metadata:
  name: emptydir-demo
  labels:
    app.kubernetes.io/name: emptyDir
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
      - name:  emptydir-vol
        mountPath: /var/log/
    containerPort: 80
  - name: alma
    image:  almalinux:9
    command: 
    - 'sleep'
    - '10000'
    volumeMounts:
      - name: emptydir-vol
        mountPath: /mnt/log
  volumes:
    - name:  emptydir-vol
      emptyDir: 
        sizeLimit: 500Mi